            ${{ env.VOD_DIR }}/*.016
            ${{ env.VOD_DIR }}/*.017
            ${{ env.VOD_DIR }}/*.018
            ${{ env.VOD_DIR }}/*.019
            ${{ env.VOD_DIR }}/*.020

      - name: Upload assets (021-025)
        if: env.HAS_VOD == 'true'
        uses: softprops/action-gh-release@v3.0.2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
